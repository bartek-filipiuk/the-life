# The Life — Default Configuration
#
# WARNING: Do NOT put secrets or API keys in this file.
# All API keys MUST be set via environment variables (see .env.example).
# This file contains only non-sensitive runtime configuration.

heartbeat_interval: 3600        # seconds between AI cycles (min: 60, max: 86400)
model: "openai/gpt-5.4"        # OpenRouter model ID

budget:
  per_cycle: 2.0                # max cost per cycle in USD
  daily: 20.0                   # max daily spend in USD
  monthly: 300.0                # max monthly spend in USD

creativity:
  temperature_range: [0.7, 1.0] # LLM temperature min/max
  novelty_threshold: 0.92       # cosine similarity threshold for novelty check
  meta_reflection_every: 10     # trigger meta-reflection every N cycles
  wildcard_every: 5             # inject random stimulus every N cycles

storage:
  data_dir: ./data
  chromadb_dir: ./data/chromadb
  sqlite_path: ./data/thelife.db
